name: cd

on:
    push:
        branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Check out the code
              uses: actions/checkout@v6

            - name: Set up node environment
              uses: actions/setup-node@v5
              with:
                node-version: 26

            - name: NPM install
              run: npm ci   

            - name: Build
              run: npm run build

            - id: 'auth'
              uses: 'google-github-actions/auth@v2'
              with:
                credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

            - name: 'Set up Cloud SDK'
              uses: 'google-github-actions/setup-gcloud@v3'

            - name: 'Use gcloud CLI'
              run: 'gcloud info'

            - name: Build docker image
              run: gcloud builds submit --tag uscentral1-docker.pkg.dev/notely-500416/notely-ar-repo/notely:latest . 