name: cd

on:
    push:
        branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Check out the code
              uses: actions/checkout@v6

            - name: Set up node environment
              uses: actions/setup-node@v5
              with:
                node-version: 26

            - name: NPM install
              run: npm ci

            - name: Build
              run: npm run build

