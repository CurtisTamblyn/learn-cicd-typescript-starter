name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 26

      - name: Clean install NPM
        run: npm ci

      - name: Run vitests
        run: npm run test -- --coverage
    
  Style:
    name: Style
    runs-on: ubuntu-latest

    steps: 
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 26

      - name: Clean install NPM
        run: npm ci
      
      - name: Format check
        run: npm run format:check